<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goal planner 🎯 - Grizz Lists</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grizz Lists">
    <meta name="theme-color" content="#0f0f1a">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icon-180.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta property="og:title" content="Goal planner 🎯 - Grizz Lists">
    <meta property="og:description" content="Personal goal planner. Set goals, track progress, and achieve more.">
    <meta property="og:image" content="https://www.grizz.biz/grizz-lists/og-image.jpeg">
    <meta property="og:image:width" content="1200">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
        <div class="bg-shape"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <a href="../index.html" class="back-link" title="Back to Grizz Lists">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <h1 class="logo">🎯 <span id="listTitle">Goal planner</span></h1>
                <div class="header-right">
                    <div class="sync-indicator" id="syncIndicator" title="Sync status">
                        <svg class="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 0 1-9 9m0 0a9 9 0 0 1-9-9m9 9v-3m0-12a9 9 0 0 1 9 9m-9-9a9 9 0 0 0-9 9m9-9v3"/>
                        </svg>
                    </div>
                    <button class="clear-done-btn" id="clearDoneBtn" title="Clear completed goals">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="goal-count" id="goalCount">0 goals</p>
        </header>

        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-label">Progress</span>
                <span class="progress-count" id="progressCount">0/0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="goal-list" id="goalList"></div>
    </div>

    <div class="add-section">
        <div class="add-input-wrapper">
            <input type="text" class="add-input" id="addInput" placeholder="Add a goal..." autocomplete="off">
            <input type="text" class="add-due-input" id="addDueInput" placeholder="Due (optional)" autocomplete="off" title="e.g. Mar 1 or Next week">
            <button class="add-submit-btn" id="addSubmitBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script type="module" src="../cache-buster.v1.js" data-auto-init></script>
    <script type="module" src="scripts.js"></script>
</body>
</html>
